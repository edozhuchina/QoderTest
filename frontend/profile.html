<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人中心 - QoderTest</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- 顶部导航栏 -->
    <header class="dashboard-header">
        <div class="header-inner">
            <div class="header-brand">
                <svg viewBox="0 0 48 48" width="32" height="32" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect width="48" height="48" rx="12" fill="#1a73e8"/>
                    <path d="M16 24l6 6 10-12" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <h1>QoderTest</h1>
            </div>
            <div class="header-user">
                <div class="user-avatar" id="user-avatar">U</div>
                <span class="user-name" id="header-username">用户</span>
                <button id="btn-logout" class="btn-header-logout">退出登录</button>
            </div>
        </div>
    </header>

    <!-- 主体 -->
    <main class="dashboard-main">
        <div class="dashboard-container">

            <!-- 欢迎横幅 -->
            <div class="welcome-banner">
                <div class="welcome-text">
                    <h2>欢迎回来，<span id="welcome-username"></span> 👋</h2>
                    <p>这是您的个人中心，您可以查看和管理您的账户信息。</p>
                </div>
                <div class="welcome-date" id="current-date"></div>
            </div>

            <!-- 信息卡片网格 -->
            <div class="card-grid">

                <!-- 基本信息卡片 -->
                <div class="dash-card">
                    <div class="dash-card-header">
                        <h3>📋 基本信息</h3>
                    </div>
                    <div class="dash-card-body">
                        <div class="info-row">
                            <span class="info-label">用户 ID</span>
                            <span class="info-value" id="profile-id">-</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">用户名</span>
                            <span class="info-value" id="profile-username">-</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">邮箱</span>
                            <span class="info-value" id="profile-email">-</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">注册时间</span>
                            <span class="info-value" id="profile-date">-</span>
                        </div>
                    </div>
                </div>

                <!-- 扩展资料卡片 -->
                <div class="dash-card">
                    <div class="dash-card-header">
                        <h3>🎨 扩展资料</h3>
                        <button class="btn-edit" id="btn-edit-profile">编辑</button>
                    </div>
                    <div class="dash-card-body" id="profile-ext">
                        <div class="info-row">
                            <span class="info-label">昵称</span>
                            <span class="info-value" id="profile-nickname">未设置</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">个人简介</span>
                            <span class="info-value" id="profile-bio">未设置</span>
                        </div>
                    </div>

                    <!-- 编辑表单（默认隐藏） -->
                    <form class="dash-card-edit" id="edit-profile-form" style="display:none;">
                        <div class="form-group">
                            <label for="edit-nickname">昵称</label>
                            <input type="text" id="edit-nickname" maxlength="64" placeholder="设置您的昵称">
                        </div>
                        <div class="form-group">
                            <label for="edit-bio">个人简介</label>
                            <textarea id="edit-bio" rows="3" placeholder="介绍一下自己..."></textarea>
                        </div>
                        <div class="form-actions">
                            <button type="button" class="btn-back" id="btn-cancel-edit">取消</button>
                            <button type="submit" class="btn-primary btn-sm">保存</button>
                        </div>
                    </form>
                </div>

                <!-- 安全信息卡片 -->
                <div class="dash-card">
                    <div class="dash-card-header">
                        <h3>🔐 安全信息</h3>
                    </div>
                    <div class="dash-card-body">
                        <div class="info-row">
                            <span class="info-label">认证方式</span>
                            <span class="info-value"><span class="badge badge-blue">JWT Token</span></span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">Access Token</span>
                            <span class="info-value token-display" id="token-preview">-</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">Token 有效期</span>
                            <span class="info-value">30 分钟</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">Refresh Token</span>
                            <span class="info-value"><span class="badge badge-green">已启用自动刷新</span></span>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/profile.js"></script>
</body>
</html>
