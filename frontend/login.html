<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - QoderTest</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-body">

    <div class="auth-container">
        <!-- Logo / 品牌区 -->
        <div class="auth-brand">
            <div class="auth-logo">
                <svg viewBox="0 0 48 48" width="48" height="48" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect width="48" height="48" rx="12" fill="#1a73e8"/>
                    <path d="M16 24l6 6 10-12" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>
            <h1 class="auth-title">QoderTest</h1>
            <p class="auth-subtitle">登录您的账户以继续</p>
        </div>

        <!-- 登录卡片 -->
        <div class="auth-card">
            <div class="auth-card-header">
                <h2>账户登录</h2>
            </div>

            <form id="login-form" novalidate>
                <!-- 用户名 -->
                <div class="form-group">
                    <label for="login-username">
                        <span class="label-icon">👤</span> 用户名
                    </label>
                    <input
                        type="text"
                        id="login-username"
                        name="username"
                        placeholder="请输入用户名"
                        autocomplete="username"
                        required
                    >
                    <span class="field-error" id="err-username"></span>
                </div>

                <!-- 密码 -->
                <div class="form-group">
                    <label for="login-password">
                        <span class="label-icon">🔒</span> 密码
                    </label>
                    <div class="input-password-wrapper">
                        <input
                            type="password"
                            id="login-password"
                            name="password"
                            placeholder="请输入密码"
                            autocomplete="current-password"
                            required
                        >
                        <button type="button" class="btn-toggle-pwd" id="toggle-pwd" title="显示/隐藏密码">
                            <span id="eye-icon">👁</span>
                        </button>
                    </div>
                    <span class="field-error" id="err-password"></span>
                </div>

                <!-- 记住我 -->
                <div class="form-row-between">
                    <label class="checkbox-label">
                        <input type="checkbox" id="remember-me">
                        <span>记住我</span>
                    </label>
                </div>

                <!-- 全局错误提示 -->
                <div class="alert alert-error" id="login-alert" style="display:none;">
                    <span class="alert-icon">⚠</span>
                    <span id="login-alert-msg"></span>
                </div>

                <!-- 登录按钮 -->
                <button type="submit" class="btn-primary btn-auth" id="btn-login">
                    <span class="btn-text">登 录</span>
                    <span class="btn-loading" style="display:none;">
                        <span class="spinner"></span> 登录中...
                    </span>
                </button>
            </form>

            <!-- 分割线 -->
            <div class="auth-divider">
                <span>或</span>
            </div>

            <!-- 切换注册 -->
            <div class="auth-card-footer">
                <p>还没有账户？</p>
                <a href="register.html" class="btn-outline">立即注册</a>
            </div>
        </div>

        <!-- 底部信息 -->
        <p class="auth-footer-text">© 2026 QoderTest · 安全登录由 JWT 提供支持</p>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
